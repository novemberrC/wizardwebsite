    /*styling and design of the div classes*/
    .header {

        background-image: url('https://i.pinimg.com/736x/e6/24/49/e62449ebf0ee8f41930a382c5dbae196.jpg');
        background-position: 0%;

        /*makes sure the text does not touch the top*/
        text-align: center;
        margin: -10px;
    }

    .top {
        background-color: inherit;
        filter: brightness(0.);

        border-width: 4px;
        border-color: inherit;

    .top:hover {

    .grid {
        /*the body's grid the meat of the website is designed under .grid.*/
        display: grid;
        grid-template-columns: 1fr 1fr 1.2fr;
        /* Creates 3 equal-width columns */
        gap: 3%;
        margin: 2rem 0rem -2rem;
        /*this makes the entire grid not touch the banner but also not touch the sides*/
        padding: 5px;
        font-family: 'Courier New', Courier, monospace;
    }

    .right {

        border-width: 3px;

        border-color: rgb(204, 134, 3);
        height: 500px;
        width: 80%;
        justify-self: end;
    }

    .middle {
        /*middle section of the website*/
        border-style: solid;
        border-width: 3px;
        height: 500px;
        width: 150%;
        background-color: rgb(150, 204, 255);
        border-color: rgb(134, 176, 214);
        text-align: left;
        justify-self: center;
    }

    .left {
        /*left section of the website*/

        border-width: 3px;
        background-color: rgb(255, 196, 231);
        border-color: rgb(234, 153, 201);

    }
</style>
